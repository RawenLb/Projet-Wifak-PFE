name: CI/CD — Banque Wifak BCT

on:
  push:
    branches: [main, develop, Rawen-Branch]
  pull_request:
    branches: [main, Rawen-Branch]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/wifak

permissions:
  contents: read
  packages: write

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1 — Build & Test Java Services
  # ════════════════════════════════════════════════════════════
  build-java:
    name: Build Java — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: EurekaServer
            artifact: EurekaServerApplication-0.0.1-SNAPSHOT
          - name: Gateway
            artifact: APIGatewayService-0.0.1-SNAPSHOT
          - name: Authentification
            artifact: authentification-service-1.0.0
          - name: Chat-Service
            artifact: chat-service
          - name: workflow-declaration
            artifact: workflow-declaration
          - name: notification-service
            artifact: notification-service
          - name: jira-integration-service
            artifact: jira-integration-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        working-directory: ./${{ matrix.service.name }}
        run: mvn clean package -DskipTests -B

      - name: Run Tests
        working-directory: ./${{ matrix.service.name }}
        run: mvn test -B
        continue-on-error: true

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.name }}-jar
          path: ./${{ matrix.service.name }}/target/*.jar
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # JOB 2 — Build & Test ML Service (Python)
  # ════════════════════════════════════════════════════════════
  build-ml:
    name: Build ML Service (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        working-directory: ./ml-service
        run: pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: ./ml-service
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503 --count --statistics
        continue-on-error: true

      - name: Validate FastAPI app imports
        working-directory: ./ml-service
        run: |
          python -c "
          from app.main import app
          from app.services.bf17_error_clustering import ErrorClusteringService
          from app.services.xml_feature_extractor import extract_features_from_xml, build_reference_stats, compute_zscore_alerts
          print('All imports OK')
          "
        continue-on-error: true

      - name: Run tests
        working-directory: ./ml-service
        run: pytest --tb=short -q
        continue-on-error: true

  # ════════════════════════════════════════════════════════════
  # JOB 3 — Build Angular Frontend
  # ════════════════════════════════════════════════════════════
  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: bct-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./bct-frontend
        run: npm ci --legacy-peer-deps

      - name: Build production
        working-directory: ./bct-frontend
        run: npm run build -- --configuration production

      - name: Run unit tests with coverage
        working-directory: ./bct-frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./bct-frontend/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # JOB 4 — Build & Push Docker Images (main branch only)
  # ════════════════════════════════════════════════════════════
  docker-build-push:
    name: Docker — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [build-java, build-ml, build-frontend]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Rawen-Branch') && github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: eureka-server
            context: EurekaServer
          - name: api-gateway
            context: Gateway
          - name: authentification-service
            context: Authentification
          - name: chat-service
            context: Chat-Service
          - name: workflow-declaration
            context: workflow-declaration
          - name: notification-service
            context: notification-service
          - name: jira-integration-service
            context: jira-integration-service
          - name: ml-service
            context: ml-service
          - name: frontend
            context: bct-frontend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Java services only)
        if: matrix.service.name != 'ml-service' && matrix.service.name != 'frontend'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ════════════════════════════════════════════════════════════
  # JOB 5 — Deploy to Kubernetes (main branch only)
  # ════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Rawen-Branch') && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags in manifests
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|:latest|:${SHORT_SHA}|g" k8s/deployments/*.yml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespaces/ --validate=false
          kubectl apply -f k8s/configmaps/ --validate=false
          kubectl apply -f k8s/secrets/ --validate=false
          kubectl apply -f k8s/volumes/ --validate=false
          kubectl apply -f k8s/deployments/mysql.yml --validate=false
          kubectl rollout status deployment/mysql -n wifak-prod --timeout=120s || true
          kubectl apply -f k8s/deployments/keycloak.yml --validate=false
          kubectl apply -f k8s/deployments/eureka-server.yml --validate=false
          kubectl apply -f k8s/deployments/api-gateway.yml --validate=false
          kubectl apply -f k8s/deployments/microservices.yml --validate=false
          kubectl apply -f k8s/services/ --validate=false
          kubectl apply -f k8s/ingress/ --validate=false
          kubectl apply -f k8s/autoscaling/ --validate=false
          kubectl apply -f k8s/monitoring/ --validate=false
          kubectl apply -f k8s/security/ --validate=false
        continue-on-error: true

      - name: Wait for rollout
        run: |
          for svc in eureka-server api-gateway authentification-service chat-service workflow-declaration bct-frontend ml-service; do
            kubectl rollout status deployment/$svc -n wifak-prod --timeout=120s || true
          done
        continue-on-error: true

      - name: Deployment summary
        run: |
          echo "Deployment complete — SHA: ${{ github.sha }}"
          kubectl get pods -n wifak-prod -o wide || echo "Cluster not reachable from CI (local cluster)"
        continue-on-error: true

  # ════════════════════════════════════════════════════════════
  # JOB 6 — Tests unitaires + SonarCloud
  # ════════════════════════════════════════════════════════════
  sonarcloud:
    name: Tests & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test & Coverage — Authentification
        working-directory: ./Authentification
        run: |
          chmod +x mvnw
          ./mvnw verify "-Dspring.profiles.active=test" "-DfailIfNoTests=false" -B || true
        continue-on-error: true

      - name: Test & Coverage — workflow-declaration
        working-directory: ./workflow-declaration
        run: |
          chmod +x mvnw
          ./mvnw verify "-Dspring.profiles.active=test" "-DfailIfNoTests=false" -B || true
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=RawenLb_Projet-Wifak-PFE
            -Dsonar.organization=rawenlb
            -Dsonar.sources=Authentification/src/main/java,workflow-declaration/src/main/java
            -Dsonar.tests=Authentification/src/test/java,workflow-declaration/src/test/java
            -Dsonar.java.binaries=Authentification/target/classes,workflow-declaration/target/classes
            -Dsonar.java.test.binaries=Authentification/target/test-classes,workflow-declaration/target/test-classes
            -Dsonar.coverage.jacoco.xmlReportPaths=Authentification/target/site/jacoco/jacoco.xml,workflow-declaration/target/site/jacoco/jacoco.xml
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/.angular/**,**/target/**,**/service/AiDeclarationService.java,**/service/XmlGenerationService.java,**/service/PdfGeneratorService.java,**/service/CsvGenerationService.java,**/service/TxtGenerationService.java,**/service/TemplateService.java
            -Dsonar.coverage.exclusions=**/BctBackendApplication.java,**/ValidationServiceApplication.java,**/config/**,**/security/**,**/repositories/**,**/feign/**,**/client/**,**/exceptions/**,**/scheduler/**,**/service/PdfGeneratorService.java,**/service/AiDeclarationService.java,**/service/XmlGenerationService.java,**/service/CsvGenerationService.java,**/service/TxtGenerationService.java,**/service/TemplateService.java,**/KeycloakAdminConfig.java,**/KeycloakRoleConverter.java,**/InternalSecretFilter.java,**/NotificationFeignConfig.java,**/MlServiceFeignClient.java,**/NotificationClient.java,**/GlobalExceptionHandler.java
