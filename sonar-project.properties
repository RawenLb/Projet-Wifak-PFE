sonar.projectKey=RawenLb_Projet-Wifak-PFE
sonar.organization=rawenlb
sonar.projectName=Projet-Wifak-PFE

# ── Sources Java uniquement (le frontend Angular est exclu de la couverture) ──
sonar.sources=Authentification/src/main/java,workflow-declaration/src/main/java
sonar.tests=Authentification/src/test/java,workflow-declaration/src/test/java

# ── Java binaries compilés par mvn verify ──
sonar.java.binaries=Authentification/target/classes,workflow-declaration/target/classes
sonar.java.test.binaries=Authentification/target/test-classes,workflow-declaration/target/test-classes

# ── JaCoCo XML reports ──
sonar.coverage.jacoco.xmlReportPaths=\
  Authentification/target/site/jacoco/jacoco.xml,\
  workflow-declaration/target/site/jacoco/jacoco.xml

# ── Exclusions générales ──
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.angular/**,\
  **/target/**

# ── Exclusions de couverture — classes sans logique métier testable ──
sonar.coverage.exclusions=\
  **/config/**,\
  **/entities/**,\
  **/dto/**,\
  **/repositories/**,\
  **/feign/**,\
  **/client/**,\
  **/exceptions/**,\
  **/scheduler/**,\
  **/security/**,\
  **/*Application.java,\
  **/PdfGeneratorService.java,\
  **/AiDeclarationService.java,\
  **/XmlGenerationService.java,\
  **/CsvGenerationService.java,\
  **/TxtGenerationService.java,\
  **/TemplateService.java

sonar.sourceEncoding=UTF-8
