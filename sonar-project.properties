sonar.projectKey=RawenLb_Projet-Wifak-PFE
sonar.organization=rawenlb
sonar.projectName=Projet-Wifak-PFE

# ── Sources Java uniquement ──
sonar.sources=Authentification/src/main/java,workflow-declaration/src/main/java
sonar.tests=Authentification/src/test/java,workflow-declaration/src/test/java

# ── Java binaries ──
sonar.java.binaries=Authentification/target/classes,workflow-declaration/target/classes
sonar.java.test.binaries=Authentification/target/test-classes,workflow-declaration/target/test-classes

# ── JaCoCo XML reports ──
sonar.coverage.jacoco.xmlReportPaths=Authentification/target/site/jacoco/jacoco.xml,workflow-declaration/target/site/jacoco/jacoco.xml

# ── Exclusions complètes (ni analysées ni comptées dans la couverture) ──
# Classes sans logique métier testable : config, entités, DTOs, repositories, feign, security
# + services de génération qui dépendent d'une vraie base de données
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.angular/**,\
  **/target/**,\
  Authentification/src/main/java/com/example/bctbackend/BctBackendApplication.java,\
  Authentification/src/main/java/com/example/bctbackend/config/**,\
  Authentification/src/main/java/com/example/bctbackend/security/**,\
  Authentification/src/main/java/com/example/bctbackend/entities/**,\
  Authentification/src/main/java/com/example/bctbackend/dto/**,\
  Authentification/src/main/java/com/example/bctbackend/repositories/**,\
  Authentification/src/main/java/com/example/bctbackend/feign/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/ValidationServiceApplication.java,\
  workflow-declaration/src/main/java/com/wifak/validationservice/config/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/entities/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/dto/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/repositories/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/feign/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/client/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/exceptions/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/scheduler/**,\
  workflow-declaration/src/main/java/com/wifak/validationservice/service/PdfGeneratorService.java,\
  workflow-declaration/src/main/java/com/wifak/validationservice/service/AiDeclarationService.java,\
  workflow-declaration/src/main/java/com/wifak/validationservice/service/XmlGenerationService.java,\
  workflow-declaration/src/main/java/com/wifak/validationservice/service/CsvGenerationService.java,\
  workflow-declaration/src/main/java/com/wifak/validationservice/service/TxtGenerationService.java,\
  workflow-declaration/src/main/java/com/wifak/validationservice/service/TemplateService.java

sonar.sourceEncoding=UTF-8
