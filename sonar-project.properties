sonar.projectKey=RawenLb_Projet-Wifak-PFE
sonar.organization=rawenlb
sonar.projectName=Projet-Wifak-PFE

# ── Sources Java uniquement ──
sonar.sources=Authentification/src/main/java,workflow-declaration/src/main/java
sonar.tests=Authentification/src/test/java,workflow-declaration/src/test/java

# ── Java binaries ──
sonar.java.binaries=Authentification/target/classes,workflow-declaration/target/classes
sonar.java.test.binaries=Authentification/target/test-classes,workflow-declaration/target/test-classes

# ── JaCoCo XML reports ──
sonar.coverage.jacoco.xmlReportPaths=Authentification/target/site/jacoco/jacoco.xml,workflow-declaration/target/site/jacoco/jacoco.xml

# ── Exclusions générales (pas analysées du tout) ──
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.angular/**,\
  **/target/**,\
  **/service/AiDeclarationService.java,\
  **/service/XmlGenerationService.java,\
  **/service/PdfGeneratorService.java,\
  **/service/CsvGenerationService.java,\
  **/service/TxtGenerationService.java,\
  **/service/TemplateService.java

# ── Exclusions de couverture uniquement ──
# Ces classes sont analysées pour bugs/smells mais exclues du calcul de couverture
# car elles ne peuvent pas être testées unitairement (infra, config, génération SQL/PDF)
sonar.coverage.exclusions=\
  **/BctBackendApplication.java,\
  **/ValidationServiceApplication.java,\
  **/config/**,\
  **/security/**,\
  **/repositories/**,\
  **/feign/**,\
  **/client/**,\
  **/exceptions/**,\
  **/scheduler/**,\
  **/service/PdfGeneratorService.java,\
  **/service/AiDeclarationService.java,\
  **/service/XmlGenerationService.java,\
  **/service/CsvGenerationService.java,\
  **/service/TxtGenerationService.java,\
  **/service/TemplateService.java

sonar.sourceEncoding=UTF-8
