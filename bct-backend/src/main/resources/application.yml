server:
  port: 8082

spring:
  application:
    name: bct-backend

  datasource:
    url: jdbc:mysql://localhost:3306/wifak_PFE?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/bct-realm
          jwk-set-uri: http://localhost:8081/realms/bct-realm/protocol/openid-connect/certs

  cloud:
    inetutils:
      preferred-networks:
        - 127.0.0        # ← force localhost

keycloak:
  auth-server-url: http://localhost:8081
  realm: bct-realm
  admin-username: admin
  admin-password: admin
  admin-client-id: bct-backend
  admin-client-secret: UQIUjf1lHznBjmmdUlNleh8N9yMwzBaG

logging:
  level:
    org.springframework.security: DEBUG
    com.example.bctbackend: INFO
    org.keycloak: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

app:
  cors:
    allowed-origins: http://localhost:4200
  frontend-client-id: bct-frontend
  internal-secret: ${INTERNAL_SECRET:wifak-internal-secret-2024}
  chat:
    ws-path: /ws/chat
    max-history: 200

file:
  upload-dir: uploads/templates
  chat-upload-dir: uploads/templates/chat

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: bct-backend:8082
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
  client:
    registry-fetch-interval-seconds: 5   # ← au niveau client, pas sous service-url
    service-url:
      defaultZone: http://localhost:8761/eureka/

feign:                          # ← au même niveau que eureka, spring, etc.
  client:
    config:
      jira-integration-service:
        connectTimeout: 3000
        readTimeout: 5000
        loggerLevel: basic

