server:
  port: 8083

spring:
  application:
    name: jira-integration-service

  datasource:
    url: jdbc:mysql://localhost:3306/wifak_jira?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/bct-realm
          jwk-set-uri: http://localhost:8081/realms/bct-realm/protocol/openid-connect/certs

  cloud:
    inetutils:
      preferred-networks:
        - 127.0.0
    openfeign:
      httpclient:
        hc5:
          enabled: true

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: jira-integration-service:8085
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://localhost:8761/eureka/

