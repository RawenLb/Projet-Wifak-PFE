                configMapKeyRef:
                  name: wifak-config
                  key: EUREKA_URL
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: wifak-config
                  key: JWT_JWK_SET_URI
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: wifak-secrets
