# ── ML Service ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: wifak-prod
  labels:
    app: ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: wifak/ml-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: DB_HOST
              value: "mysql-service"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "wifak_PFE"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wifak-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: VALIDATION_DB_NAME
              value: "wifak_validation"
            - name: BCT_BACKEND_URL
              value: "http://authentification-service:8082"
            - name: VALIDATION_SERVICE_URL
              value: "http://workflow-declaration:8084"
          volumeMounts:
            - name: ml-models
              mountPath: /app/models/saved
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: ml-models
          persistentVolumeClaim:
            claimName: ml-models-pvc
---
# ── Frontend ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bct-frontend
  namespace: wifak-prod
  labels:
    app: bct-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bct-frontend
  template:
    metadata:
      labels:
        app: bct-frontend
    spec:
      containers:
        - name: bct-frontend
          image: wifak/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
