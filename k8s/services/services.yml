---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: wifak-prod
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
---
# Keycloak — NodePort pour accès browser via bct.wifak.tn/auth
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: wifak-prod
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-service
  namespace: wifak-prod
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
      nodePort: 30761
  type: NodePort
---
# API Gateway — LoadBalancer principal (localhost:80)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: wifak-prod
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8088
      nodePort: 31845
    - name: https
      port: 443
      targetPort: 8088
      nodePort: 30843
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: authentification-service
  namespace: wifak-prod
spec:
  selector:
    app: authentification-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: wifak-prod
spec:
  selector:
    app: chat-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-declaration
  namespace: wifak-prod
spec:
  selector:
    app: workflow-declaration
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: wifak-prod
spec:
  selector:
    app: notification-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: jira-integration-service
  namespace: wifak-prod
spec:
  selector:
    app: jira-integration-service
  ports:
    - port: 8089
      targetPort: 8085
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: wifak-prod
spec:
  selector:
    app: ml-service
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
---
# Frontend — NodePort (plus de conflit avec api-gateway LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: wifak-prod
spec:
  selector:
    app: bct-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32744
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: wifak-prod
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: wifak-prod
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
  type: NodePort
