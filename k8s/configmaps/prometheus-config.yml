apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: wifak
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      - job_name: 'eureka-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['eureka-server:8761']

      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway:8088']

      - job_name: 'authentification-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['authentification-service:8082']

      - job_name: 'workflow-declaration'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['workflow-declaration:8084']

      - job_name: 'chat-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['chat-service:8083']

      - job_name: 'notification-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notification-service:8086']

      - job_name: 'jira-integration-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['jira-integration-service:8085']

      - job_name: 'ml-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['ml-service:8090']

      - job_name: 'mysql-exporter'
        static_configs:
          - targets: ['mysql-exporter:9104']
