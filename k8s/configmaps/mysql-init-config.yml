apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
  namespace: wifak
data:
  01-create-databases.sql: |
    -- Création des bases de données Wifak BCT
    CREATE DATABASE IF NOT EXISTS wifak_PFE
      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    CREATE DATABASE IF NOT EXISTS wifak_validation
      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    CREATE DATABASE IF NOT EXISTS wifak_chat
      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    CREATE DATABASE IF NOT EXISTS wifak_notification
      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    CREATE DATABASE IF NOT EXISTS wifak_jira
      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    CREATE DATABASE IF NOT EXISTS keycloak
      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    -- Droits complets pour root depuis n'importe quel hôte
    GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;
    FLUSH PRIVILEGES;

