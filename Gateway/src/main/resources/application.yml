server:
  port: 8088

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ── workflow-declaration (port 8084) ──────────────────────────
        # IMPORTANT: routes plus spécifiques AVANT les routes génériques

        - id: workflow-declaration-types
          uri: lb://workflow-declaration
          predicates:
            - Path=/api/admin/declaration-types/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

        - id: workflow-declarations
          uri: lb://workflow-declaration
          predicates:
            - Path=/api/declarations/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

        - id: workflow-validation
          uri: lb://workflow-declaration
          predicates:
            - Path=/api/validation/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

        - id: workflow-audit
          uri: lb://workflow-declaration
          predicates:
            - Path=/api/audit/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

        - id: workflow-templates
          uri: lb://workflow-declaration
          predicates:
            - Path=/api/templates/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

        - id: workflow-ml
          uri: http://wifak-ml:8090
          predicates:
            - Path=/api/ml/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            - RewritePath=/api/ml/(?<segment>.*), /${segment}

        # ── authentification-service (port 8082) ─────────────────────
        - id: authentification-service
          uri: lb://authentification-service
          predicates:
            - Path=/api/admin/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

        # ── chat-service (port 8083) ──────────────────────────────────
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

        # ── notification-service ──────────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

        # ── jira-integration-service ──────────────────────────────────
        - id: jira-integration-service
          uri: lb://jira-integration-service
          predicates:
            - Path=/api/jira/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
        add-to-simple-url-handler-mapping: true

    loadbalancer:
      cache:
        ttl: 5s
        capacity: 256

    inetutils:
      preferred-networks:
        - 127.0.0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/bct-realm
          jwk-set-uri: http://localhost:8081/realms/bct-realm/protocol/openid-connect/certs

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: api-gateway:8088
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s
    tags:
      application: api-gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# ── Profil Docker / K8s ────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    inetutils:
      preferred-networks:
        - 172.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/bct-realm/protocol/openid-connect/certs

eureka:
  instance:
    prefer-ip-address: true
    instance-id: api-gateway:8088
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
