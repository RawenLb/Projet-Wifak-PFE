<!-- src/app/chat/call.component.html — WebRTC Call UI — Wifak Bank -->

<!--
  Architecture: les <video> sont TOUJOURS dans le DOM (display:none par défaut)
  pour que @ViewChild fonctionne dès que les streams arrivent.
  L'overlay est affiché par-dessus quand un appel est en cours.
-->

<!-- ── Éléments vidéo permanents (invisibles par défaut) ── -->
<video #remoteVideo class="call-remote-video-hidden" autoplay playsinline></video>
<video #localVideo  class="call-local-video-hidden"  autoplay playsinline muted></video>

<!-- ── Overlay d'appel ── -->
<div class="call-overlay" *ngIf="isVisible" [class.call-active]="isActive">

  <!-- Zone vidéo — affiche les streams dans l'overlay quand actif -->
  <div class="call-video-area" *ngIf="isVideo && isActive">
    <!-- Les streams sont attachés aux éléments cachés ci-dessus via @ViewChild -->
    <!-- On clone visuellement avec des éléments miroir dans l'overlay -->
    <div class="call-video-mirror" id="call-remote-mirror"></div>
    <div class="call-video-pip"    id="call-local-mirror"></div>
  </div>

  <!-- Carte d'appel -->
  <div class="call-card" [class.call-card-video]="isVideo && isActive">

    <div class="call-avatar-ring"
         [class.ring-pulse]="callState === 'CALLING' || callState === 'RINGING'"
         [hidden]="isVideo && isActive">
      <div class="call-avatar">{{ getInitials(call?.remoteName ?? '') }}</div>
    </div>

    <div class="call-info">
      <div class="call-name">{{ call?.remoteName }}</div>
      <div class="call-status">
        <span *ngIf="callState === 'CALLING'" class="status-dots">
          <span></span><span></span><span></span>
        </span>
        {{ statusLabel }}
      </div>
      <div class="call-type-badge">
        <svg *ngIf="isVideo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <svg *ngIf="!isVideo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        {{ isVideo ? 'Appel vidéo' : 'Appel audio' }}
      </div>
    </div>

    <!-- Appel entrant -->
    <div class="call-actions" *ngIf="callState === 'RINGING'">
      <div class="call-ring-timer">{{ ringTimer }}s</div>
      <button class="call-btn call-btn-reject" (click)="reject()" title="Refuser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
      <button class="call-btn call-btn-accept" (click)="accept()" title="Accepter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </button>
    </div>

    <!-- Appel sortant / actif -->
    <div class="call-actions"
         *ngIf="callState === 'CALLING' || callState === 'CONNECTING' || callState === 'ACTIVE'">

      <button class="call-ctrl-btn" [class.ctrl-active]="isMuted" (click)="toggleMute()" title="Micro">
        <svg *ngIf="!isMuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <svg *ngIf="isMuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
          <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <button *ngIf="isVideo" class="call-ctrl-btn" [class.ctrl-active]="isCameraOff"
              (click)="toggleCamera()" title="Caméra">
        <svg *ngIf="!isCameraOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <svg *ngIf="isCameraOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h4a2 2 0 0 1 2 2v9.34m-7.72-2.06A4 4 0 1 1 7.72 7.72"/>
        </svg>
      </button>

      <button class="call-btn call-btn-reject" (click)="hangUp()" title="Raccrocher">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>

  </div>
</div>
