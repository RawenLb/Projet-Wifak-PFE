<div class="dashboard-container">
  <!-- ============================================ -->
  <!-- SIDEBAR AGENT -->
  <!-- ============================================ -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="logo-section">
      <div class="logo">
        <div class="logo-icon">🏛️</div>
        <div class="logo-text">
          <div class="bank-name">WIFAK BANK</div>
          <div class="bank-subtitle">Espace Agent</div>
        </div>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
    
    <nav class="nav-menu">
      <!-- Dashboard -->
<a class="nav-item" 
   [routerLink]="['/agent/declarations']" 
   [class.active]="isActive('/agent/declarations')">
  <span class="nav-icon">...</span>
  <span class="nav-text">Tableau de bord</span>
</a>

      <!-- Mes Déclarations -->
      <a class="nav-item" 
         [routerLink]="['/agent/declarations']"
         [class.active]="isActive('/agent')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
        </span>
        <span class="nav-text">Mes Déclarations</span>
         <span class="nav-badge" *ngIf="rejectedCount > 0">
    {{ rejectedCount > 9 ? '9+' : rejectedCount }}
  </span>
      </a>

      <!-- Historique -->
<a class="nav-item"
   [routerLink]="['/agent/calendar']"
   [class.active]="isActive('/calendar')">
  <span class="nav-icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
  </span>
  <span class="nav-text">Calendrier</span>
</a>

      <!-- Types de déclarations (consultation) -->
      <a class="nav-item" 
         [routerLink]="['/agent/types']"
         [class.active]="isActive('/types')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
          </svg>
        </span>
        <span class="nav-text">Types disponibles</span>
      </a>

      <!-- Aide -->
      <a class="nav-item" 
         [routerLink]="['/agent/help']"
         [class.active]="isActive('/help')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </span>
        <span class="nav-text">Aide & Support</span>
      </a>
    </nav>

    <!-- User Profile & Logout -->
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">{{ getUserInitials() }}</div>
        <div class="user-info">
          <div class="user-name">{{ username }}</div>
          <div class="user-role">{{ userRole }}</div>
        </div>
      </div>

      <button class="btn-logout" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-text">Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- ============================================ -->
  <!-- MAIN CONTENT -->
  <!-- ============================================ -->
  <div class="main-content" [class.sidebar-collapsed]="sidebarCollapsed">
    <router-outlet></router-outlet>
  </div>
</div>
