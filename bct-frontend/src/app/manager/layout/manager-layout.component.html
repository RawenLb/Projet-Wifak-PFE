<!-- src/app/manager-layout/manager-layout.component.html -->
<div class="dashboard-container">

  <!-- ═══════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════ -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
            <path d="M20 4C20 4 29 13 29 21c0 7-4.5 11-9 13-4.5-2-9-6-9-13C11 13 20 4 20 4z" fill="#C8192E" opacity=".9"/>
            <path d="M20 10c0 0 6 7 6 12s-3 8-6 9.5c-3-1.5-6-4.5-6-9.5s6-12 6-12z" fill="#A8B4C0" opacity=".75"/>
            <path d="M20 17c0 0 3 4 3 6.5S21.5 27 20 28c-1.5-1-3-2.5-3-4.5s3-6.5 3-6.5z" fill="white" opacity=".85"/>
          </svg>
        </div>
        <div class="logo-text">
          <div class="bank-name">WIFAK BANK</div>
          <div class="bank-subtitle">Espace Responsable</div>
        </div>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="nav-menu">

      <span class="nav-section-label" *ngIf="!sidebarCollapsed">Supervision</span>

      <button class="nav-item" [class.active]="isActive('/manager/dashboard')" (click)="navigate('/manager/dashboard')" [title]="sidebarCollapsed ? 'Tableau de bord' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </span>
        <span class="nav-text">Tableau de bord</span>
      </button>

      <button class="nav-item" [class.active]="isActive('/manager/pending')" (click)="navigate('/manager/pending')" [title]="sidebarCollapsed ? 'Validation' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </span>
        <span class="nav-text">Validation</span>
        <span class="nav-badge" *ngIf="pendingCount > 0 && !sidebarCollapsed">
          {{ pendingCount > 9 ? '9+' : pendingCount }}
        </span>
      </button>

      <button class="nav-item" [class.active]="isActive('/manager/history')" (click)="navigate('/manager/history')" [title]="sidebarCollapsed ? 'Historique' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="12 8 12 12 14 14"/>
            <path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/>
          </svg>
        </span>
        <span class="nav-text">Historique</span>
      </button>

      <span class="nav-section-label" *ngIf="!sidebarCollapsed">Analyse</span>

      <button class="nav-item" [class.active]="isActive('/manager/calendar')" (click)="navigate('/manager/calendar')" [title]="sidebarCollapsed ? 'Calendrier BCT' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </span>
        <span class="nav-text">Calendrier BCT</span>
      </button>

      <button class="nav-item" [class.active]="isActive('/manager/reports')" (click)="navigate('/manager/reports')" [title]="sidebarCollapsed ? 'Rapports' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
            <line x1="2" y1="20" x2="22" y2="20"/>
          </svg>
        </span>
        <span class="nav-text">Rapports</span>
      </button>

      <button class="nav-item" [class.active]="isActive('/manager/ml')" (click)="navigate('/manager/ml')" [title]="sidebarCollapsed ? 'Aide intelligente' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"/>
          </svg>
        </span>
        <span class="nav-text">Aide intelligente</span>
      </button>

    </nav>

    <!-- User Profile & Logout -->
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">{{ currentUserInitials }}</div>
        <div class="user-info">
          <div class="user-name">{{ currentUserName }}</div>
          <div class="user-role">Responsable</div>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-text">Déconnexion</span>
      </button>
    </div>

  </aside>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════ -->
  <div class="main-content">

    <!-- Topbar -->
    <div class="manager-topbar">
      <div class="topbar-left">
        <h2 class="topbar-title">{{ pageTitle }}</h2>
        <p class="topbar-subtitle">{{ pageSubtitle }}</p>
      </div>
      <div class="topbar-right">
        <app-notification-bell></app-notification-bell>
      </div>
    </div>

    <!-- Router Outlet -->
    <div class="page-scroll-area">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>

<!-- Chat widget -->
<app-chat></app-chat>
