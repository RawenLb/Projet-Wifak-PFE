<!-- src/app/auditor-layout/auditor-layout.component.html -->
<div class="dashboard-container">

  <!-- ═══════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════ -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
            <path d="M20 4C20 4 29 13 29 21c0 7-4.5 11-9 13-4.5-2-9-6-9-13C11 13 20 4 20 4z" fill="#C8192E" opacity=".9"/>
            <path d="M20 10c0 0 6 7 6 12s-3 8-6 9.5c-3-1.5-6-4.5-6-9.5s6-12 6-12z" fill="#A8B4C0" opacity=".75"/>
            <path d="M20 17c0 0 3 4 3 6.5S21.5 27 20 28c-1.5-1-3-2.5-3-4.5s3-6.5 3-6.5z" fill="white" opacity=".85"/>
          </svg>
        </div>
        <div class="logo-text">
          <div class="bank-name">WIFAK BANK</div>
          <div class="bank-subtitle">Espace Auditeur</div>
        </div>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="nav-menu">

      <!-- Section Audit -->
      <span class="nav-section-label" *ngIf="!sidebarCollapsed">Audit</span>

      <button class="nav-item" [class.active]="isActive('/auditor/dashboard')" (click)="navigate('/auditor/dashboard')" [title]="sidebarCollapsed ? 'Tableau de bord' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </span>
        <span class="nav-text">Tableau de bord</span>
      </button>

      <button class="nav-item" [class.active]="isActive('/auditor/history')" (click)="navigate('/auditor/history')" [title]="sidebarCollapsed ? 'Historique' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="12 8 12 12 14 14"/>
            <path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/>
          </svg>
        </span>
        <span class="nav-text">Historique</span>
      </button>

      <button class="nav-item" [class.active]="isActive('/auditor/logs')" (click)="navigate('/auditor/logs')" [title]="sidebarCollapsed ? 'Journaux' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </span>
        <span class="nav-text">Journaux</span>
      </button>

      <!-- Section Consultation -->
      <span class="nav-section-label" *ngIf="!sidebarCollapsed">Consultation</span>

      <button class="nav-item" [class.active]="isActive('/auditor/archives')" (click)="navigate('/auditor/archives')" [title]="sidebarCollapsed ? 'Archives' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="21 8 21 21 3 21 3 8"/>
            <rect x="1" y="3" width="22" height="5"/>
            <line x1="10" y1="12" x2="14" y2="12"/>
          </svg>
        </span>
        <span class="nav-text">Archives</span>
      </button>

      <button class="nav-item" [class.active]="isActive('/auditor/search')" (click)="navigate('/auditor/search')" [title]="sidebarCollapsed ? 'Recherche' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <span class="nav-text">Recherche</span>
      </button>

      <button class="nav-item" [class.active]="isActive('/auditor/export')" (click)="navigate('/auditor/export')" [title]="sidebarCollapsed ? 'Export rapports' : ''">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </span>
        <span class="nav-text">Export rapports</span>
      </button>

    </nav>

    <!-- User Profile & Logout -->
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">{{ currentUserInitials }}</div>
        <div class="user-info">
          <div class="user-name">{{ currentUserName }}</div>
          <div class="user-role">Auditeur</div>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-text">Déconnexion</span>
      </button>
    </div>

  </aside>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════ -->
  <div class="main-content">

    <!-- Topbar -->
    <div class="auditor-topbar">
      <div class="topbar-left">
        <h2 class="topbar-title">{{ pageTitle }}</h2>
        <p class="topbar-subtitle">{{ pageSubtitle }}</p>
      </div>
      <div class="topbar-right">
        <div class="readonly-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Lecture seule
        </div>
      </div>
    </div>

    <!-- Router Outlet -->
    <div class="page-scroll-area">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
