<!-- src/app/manager-layout/manager-layout.component.html -->

<div class="manager-shell" [class.sidebar-collapsed]="sidebarCollapsed">

  <!-- ══════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════ -->
  <aside class="mgr-sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#4ADE80" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M2 17l10 5 10-5" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12l10 5 10-5" stroke="#86EFAC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-text" *ngIf="!sidebarCollapsed">
        <span class="brand-name">WIFAK BANK</span>
        <span class="brand-role">Espace Responsable</span>
      </div>
      <button class="collapse-btn" (click)="toggleSidebar()" [title]="sidebarCollapsed ? 'Déplier' : 'Réduire'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline *ngIf="!sidebarCollapsed" points="15 18 9 12 15 6"/>
          <polyline *ngIf="sidebarCollapsed"  points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <div class="nav-section" *ngFor="let group of navItems">
        <span class="nav-section-label" *ngIf="!sidebarCollapsed">{{ group.section }}</span>

        <button
          class="nav-link"
          *ngFor="let link of group.links"
          [class.active]="isActive(link.path)"
          (click)="navigate(link.path)"
          [title]="sidebarCollapsed ? link.label : ''">

          <!-- Icon -->
          <span class="nav-icon">
            <!-- dashboard -->
            <svg *ngIf="link.icon === 'dashboard'" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
            </svg>
            <!-- validation -->
            <svg *ngIf="link.icon === 'validation'" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <!-- declarations -->
            <svg *ngIf="link.icon === 'declarations'" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <!-- history -->
            <svg *ngIf="link.icon === 'history'" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="12 8 12 12 14 14"/>
              <path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/>
            </svg>
            <!-- calendar -->
            <svg *ngIf="link.icon === 'calendar'" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <!-- reports -->
            <svg *ngIf="link.icon === 'reports'" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
            </svg>
            <!-- admin -->
            <svg *ngIf="link.icon === 'admin'" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </span>

          <span class="nav-label" *ngIf="!sidebarCollapsed">{{ link.label }}</span>

          <span class="nav-badge urgent" *ngIf="link.badge && !sidebarCollapsed">
            {{ link.badge }}
          </span>
        </button>
      </div>
    </nav>

    <!-- User Profile -->
    <div class="sidebar-user">
      <div class="user-avatar-ring">
        <div class="user-avatar">{{ currentUserInitials }}</div>
      </div>
      <div class="user-details" *ngIf="!sidebarCollapsed">
        <span class="user-name">{{ currentUserName }}</span>
        <span class="user-badge">Responsable</span>
      </div>
      <button class="logout-btn" (click)="logout()" [title]="sidebarCollapsed ? 'Déconnexion' : ''" *ngIf="!sidebarCollapsed">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
      <button class="logout-btn" (click)="logout()" title="Déconnexion" *ngIf="sidebarCollapsed">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

  </aside>

  <!-- ══════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════ -->
  <div class="mgr-main">
    <!-- Top Bar -->
    <header class="mgr-topbar">
      <div class="topbar-left">
        <div class="page-breadcrumb">
          <span class="breadcrumb-root">Wifak Bank</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          <span class="breadcrumb-current">Espace Responsable</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date">
          {{ today | date:'EEEE d MMMM yyyy' : '' : 'fr' }}
        </div>
        <div class="topbar-dot" title="Connecté"></div>
      </div>
    </header>

    <!-- Router Outlet -->
    <main class="mgr-content">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
